                    { speaker: "白家月", hanzi: "是啊，电影院还不小。", pinyin: "Shì a, diànyǐngyuàn hái bù xiǎo.", uz: "Ha, kinoteatr kichkina emas ekan.", ru: "Да, и кинотеатр не маленький.", en: "Yeah, and it's pretty big." },

                    { speaker: "白家月", hanzi: "天啊！有的还不到二十块钱。", pinyin: "Tiān a! Yǒude hái bú dào èrshí kuài qián.", uz: "Xudoyim! Ba'zilari yigirma yuanga ham yetmaydi.", ru: "О боже! Некоторые стоят меньше двадцати юаней.", en: "Goodness! Some are less than 20 yuan." },
                    { speaker: "安妮", hanzi: "那你想不想去看个电影？", pinyin: "Nà nǐ xiǎng bu xiǎng qù kàn gè diànyǐng?", uz: "Unday bo'lsa, kino ko'rishga borishni xohlaysizmi?", ru: "Тогда не хочешь сходить посмотреть фильм?", en: "So, do you want to watch a movie?" },

                    en: "Verbs, verbal phrases can be placed before a noun (with '的') to indicate the characteristics or state of that noun."
                },
                examples: [

        // --- HELPER COMPONENTS & ICONS ---
        
        const AudioIcon = ({className="w-5 h-5"}) => (

            </svg>
        );

        const CheckIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth={2} stroke="currentColor" className="w-6 h-6 text-green-500">
              <path strokeLinecap="round" strokeLinejoin="round" d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
            </svg>
        );

        const CrossIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth={2} stroke="currentColor" className="w-6 h-6 text-red-500">
              <path strokeLinecap="round" strokeLinejoin="round" d="m9.75 9.75 4.5 4.5m0-4.5-4.5 4.5M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
            </svg>
        );

        // Utility to speak text
        const speakText = (text) => {
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'zh-CN';
                window.speechSynthesis.speak(utterance);
            }
        };

        // --- MAIN COMPONENTS ---

        const Flashcards = () => {
            const [currentIndex, setCurrentIndex] = React.useState(0);
            const [isFlipped, setIsFlipped] = React.useState(false);

            const nextCard = () => {
                setIsFlipped(false);
                setTimeout(() => {
                    setCurrentIndex((prev) => (prev + 1) % vocabData.length);
                }, 200);
            };

            const prevCard = () => {
                setIsFlipped(false);
                setTimeout(() => {
                    setCurrentIndex((prev) => (prev - 1 + vocabData.length) % vocabData.length);
                }, 200);
            };

            const currentCard = vocabData[currentIndex];

            return (
                <div className="flex flex-col items-center w-full max-w-lg mx-auto">
                    <div className="text-sm font-semibold text-teal-600 mb-4">{currentIndex + 1} / {vocabData.length}</div>
                    
                    <div className="w-full h-80 perspective-1000 cursor-pointer" onClick={() => setIsFlipped(!isFlipped)}>
                        <div className={`relative w-full h-full transition-transform-500 transform-style-3d ${isFlipped ? 'rotate-y-180' : ''}`}>
                            {/* Front */}
                            <div className="absolute w-full h-full backface-hidden bg-white rounded-3xl shadow-xl flex flex-col items-center justify-center border-2 border-teal-100">
                                <button 
                                    onClick={(e) => { e.stopPropagation(); speakText(currentCard.hanzi); }}
                                    className="absolute top-4 right-4 p-3 bg-teal-50 text-teal-600 rounded-full hover:bg-teal-100 transition-colors"
                                >
                                    <AudioIcon />
                                </button>
                                <h2 className="text-7xl font-bold text-gray-800 mb-4">{currentCard.hanzi}</h2>
                                <p className="text-2xl text-gray-500">{currentCard.pinyin}</p>
                            </div>
                            
                            {/* Back */}
                            <div className="absolute w-full h-full backface-hidden bg-teal-600 text-white rounded-3xl shadow-xl flex flex-col items-center justify-center rotate-y-180 border-2 border-teal-600 p-6 text-center">
                                <h2 className="text-3xl font-bold mb-4">{currentCard.uz}</h2>
                                <div className="w-16 h-1 bg-white/30 rounded mb-4"></div>
                                <p className="text-xl opacity-90 mb-2">RU: {currentCard.ru}</p>
                                <p className="text-xl opacity-90">EN: {currentCard.en}</p>
                            </div>
                        </div>
                    </div>

                    <div className="flex gap-4 mt-8">
                        <button onClick={prevCard} className="px-6 py-3 bg-white text-teal-600 font-bold rounded-xl shadow hover:bg-teal-50 transition-colors">Oldingi</button>
                        <button onClick={nextCard} className="px-6 py-3 bg-teal-600 text-white font-bold rounded-xl shadow hover:bg-teal-700 transition-colors">Keyingi</button>
                    </div>
                </div>
            );
        };

        const VocabQuiz = () => {
            const [questions, setQuestions] = React.useState([]);
            const [currentQIndex, setCurrentQIndex] = React.useState(0);
            const [score, setScore] = React.useState(0);
            const [showResult, setShowResult] = React.useState(false);
            const [selectedOption, setSelectedOption] = React.useState(null);

            // Generate quiz on load
            React.useEffect(() => {
                const shuffledVocab = [...vocabData].sort(() => 0.5 - Math.random());
                const generatedQuestions = shuffledVocab.map(target => {
                    const wrongOptions = vocabData
                        .filter(v => v.uz !== target.uz)
                        .sort(() => 0.5 - Math.random())
                        .slice(0, 3)
                        .map(v => v.uz);
                    const options = [...wrongOptions, target.uz].sort(() => 0.5 - Math.random());
                    return { question: target.hanzi, answer: target.uz, options: options, audio: target.hanzi };
                });
                setQuestions(generatedQuestions);
            }, []);

            if (questions.length === 0) return <div>Loading...</div>;

            const currentQ = questions[currentQIndex];

            const handleAnswer = (opt) => {
                if (selectedOption !== null) return;
                setSelectedOption(opt);
                if (opt === currentQ.answer) setScore(score + 1);
                
                setTimeout(() => {
                    setSelectedOption(null);
                    if (currentQIndex < questions.length - 1) {
                        setCurrentQIndex(currentQIndex + 1);
                    } else {
                        setShowResult(true);
                    }
                }, 1000);
            };

            const reset = () => {
                setCurrentQIndex(0);
                setScore(0);
                setShowResult(false);
                // regenerate could go here
            };

            if (showResult) {
                return (
                    <div className="text-center p-8 bg-white rounded-3xl shadow-xl max-w-md mx-auto border-t-4 border-teal-500">
                        <h2 className="text-3xl font-bold mb-4 text-gray-800">Natija (Score)</h2>
                        <p className="text-5xl font-bold text-teal-600 mb-6">{score} / {questions.length}</p>
                        <button onClick={reset} className="px-8 py-3 bg-teal-600 text-white font-bold rounded-xl shadow-lg hover:bg-teal-700">Qayta boshlash</button>
                    </div>
                );
            }

            return (
                <div className="max-w-md mx-auto bg-white p-8 rounded-3xl shadow-xl border border-gray-100">
                    <div className="text-sm font-semibold text-teal-600 mb-4 text-center">Savol {currentQIndex + 1} / {questions.length}</div>
                    
                    <div className="flex flex-col items-center mb-8">
                        <button onClick={() => speakText(currentQ.audio)} className="mb-2 p-2 text-teal-500 hover:text-teal-700">
                             <AudioIcon className="w-8 h-8" />
                        </button>
                        <h2 className="text-8xl font-bold text-gray-800">{currentQ.question}</h2>
                        <p className="text-gray-400 mt-2 text-sm">Tarjimasini toping</p>
                    </div>

                    <div className="space-y-3">
                        {currentQ.options.map((opt, i) => {
                            let btnClass = "w-full p-4 text-lg font-medium rounded-xl border-2 text-left transition-all ";
                            if (selectedOption === null) {
                                btnClass += "border-gray-200 hover:border-teal-400 hover:bg-teal-50";
                            } else if (opt === currentQ.answer) {
                                btnClass += "border-green-500 bg-green-50 text-green-700";
                            } else if (opt === selectedOption) {
                                btnClass += "border-red-500 bg-red-50 text-red-700";
                            } else {
                                btnClass += "border-gray-200 opacity-50";
                            }

                            return (
                                <button key={i} onClick={() => handleAnswer(opt)} className={btnClass} disabled={selectedOption !== null}>
                                    {opt}
                                    {selectedOption && opt === currentQ.answer && <CheckIcon className="float-right" />}
                                    {selectedOption === opt && opt !== currentQ.answer && <CrossIcon className="float-right" />}
                                </button>
                            );
                        })}
                    </div>
                </div>
            );
        };

        const Dialogue = () => {
            return (
                <div className="max-w-3xl mx-auto space-y-12">
                    {dialogueData.map((dialogue, idx) => (
                        <div key={idx} className="bg-white rounded-3xl shadow-lg overflow-hidden border border-gray-100">
                            <div className="bg-teal-600 text-white p-4 font-bold text-lg">{dialogue.title}</div>
                            <div className="p-6 space-y-6">
                                {dialogue.lines.map((line, lIdx) => (
                                    <div key={lIdx} className={`flex gap-4 p-4 rounded-xl ${line.speaker === '白家月' ? 'bg-blue-50' : line.speaker === '独白' ? 'bg-gray-50' : 'bg-teal-50'}`}>
                                        <div className="flex-shrink-0 pt-1">
                                            <button onClick={() => speakText(line.hanzi)} className="p-2 bg-white rounded-full shadow-sm text-teal-600 hover:bg-teal-100">
                                                <AudioIcon />
                                            </button>
                                        </div>
                                        <div className="flex-grow">
                                            <div className="font-bold text-gray-500 text-sm mb-1">{line.speaker}</div>
                                            <div className="text-2xl font-bold text-gray-800 mb-1">{line.hanzi}</div>
                                            <div className="text-lg text-teal-700 mb-3">{line.pinyin}</div>
                                            <div className="space-y-1 text-sm text-gray-600 border-t border-gray-200 pt-2">
                                                <p><strong className="text-gray-400 mr-2">UZ:</strong> {line.uz}</p>
                                                <p><strong className="text-gray-400 mr-2">RU:</strong> {line.ru}</p>
                                                <p><strong className="text-gray-400 mr-2">EN:</strong> {line.en}</p>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    ))}
                </div>
            );
        };

        const GrammarExp = () => (
            <div className="max-w-3xl mx-auto space-y-8">
                {grammarData.map((item, idx) => (
                    <div key={idx} className="bg-white p-8 rounded-3xl shadow-lg border border-gray-100">
                        <h3 className="text-2xl font-bold text-teal-700 mb-6">{item.title}</h3>
                        <div className="space-y-4 mb-6 p-4 bg-gray-50 rounded-xl">
                            <p><strong>UZ:</strong> {item.explanation.uz}</p>
                            <p><strong>RU:</strong> {item.explanation.ru}</p>
                            <p><strong>EN:</strong> {item.explanation.en}</p>
                        </div>
                        <h4 className="font-bold text-gray-500 uppercase text-sm mb-3">Misollar (Examples)</h4>
                        <ul className="space-y-4">
                            {item.examples.map((ex, eIdx) => (
                                <li key={eIdx} className="flex items-start gap-4 text-lg bg-teal-50/50 p-4 rounded-xl border border-teal-100">
                                    <div className="w-2 h-2 rounded-full bg-teal-500 mt-2.5 flex-shrink-0"></div>
                                    <div className="flex-grow">
                                        <div className="flex items-center gap-3 mb-1">
                                            <span className="font-bold text-gray-800 text-xl">{ex.hanzi}</span>
                                            <button onClick={() => speakText(ex.hanzi)} className="text-teal-600 hover:text-teal-800 hover:bg-teal-100 p-1.5 rounded-full transition-colors bg-white shadow-sm"><AudioIcon className="w-5 h-5"/></button>
                                        </div>
                                        <div className="text-teal-700 font-medium mb-1">{ex.pinyin}</div>
                                        <div className="text-gray-600 text-sm">{ex.uz}</div>
                                    </div>
                                </li>
                            ))}
                        </ul>
                    </div>
                ))}
            </div>
        );

        const GrammarQuiz = () => {
             const [score, setScore] = React.useState(0);
             const [showResult, setShowResult] = React.useState(false);
             const [answers, setAnswers] = React.useState({});

             const handleSelect = (qIdx, opt) => {
                 if(showResult) return;
                 setAnswers({...answers, [qIdx]: opt});
             };

             const submit = () => {
                 let s = 0;
                 grammarQuizData.forEach((q, i) => {
                     if(answers[i] === q.a) s++;
                 });
                 setScore(s);
                 setShowResult(true);
             };

             return (
                 <div className="max-w-3xl mx-auto bg-white p-8 rounded-3xl shadow-lg">
                     <h2 className="text-2xl font-bold mb-8 text-center text-gray-800">Grammatika Testi</h2>
                     <div className="space-y-8">
                         {grammarQuizData.map((q, i) => (
                             <div key={i} className="border-b border-gray-100 pb-6 last:border-0">
                                 <p className="text-xl mb-4 font-medium"><span className="text-teal-500 mr-2">{i+1}.</span> {q.q}</p>
                                 <div className="flex gap-4">
                                     {q.options.map(opt => {
                                         let btnClass = "px-6 py-2 rounded-lg border-2 text-lg font-bold transition-colors ";
                                         if (showResult) {
                                             if (opt === q.a) btnClass += "border-green-500 bg-green-50 text-green-700";
                                             else if (answers[i] === opt && opt !== q.a) btnClass += "border-red-500 bg-red-50 text-red-700";
                                             else btnClass += "border-gray-200 text-gray-400";
                                         } else {
                                             btnClass += answers[i] === opt ? "border-teal-500 bg-teal-50 text-teal-700" : "border-gray-200 hover:border-teal-300";
                                         }
                                         return (
                                             <button key={opt} onClick={() => handleSelect(i, opt)} className={btnClass}>{opt}</button>
                                         );
                                     })}
                                 </div>
                             </div>
                         ))}
                     </div>
                     {!showResult ? (
                         <div className="mt-8 text-center">
                             <button onClick={submit} disabled={Object.keys(answers).length !== grammarQuizData.length} className="px-8 py-3 bg-teal-600 text-white font-bold rounded-xl shadow hover:bg-teal-700 disabled:opacity-50 disabled:cursor-not-allowed">Tekshirish</button>
                         </div>
                     ) : (
                         <div className="mt-8 p-6 bg-teal-50 rounded-xl text-center border border-teal-200">
                             <p className="text-2xl font-bold">Natija: <span className="text-teal-600">{score} / {grammarQuizData.length}</span></p>
                             <button onClick={() => {setShowResult(false); setAnswers({}); setScore(0);}} className="mt-4 px-6 py-2 bg-white text-teal-600 border border-teal-600 font-bold rounded-lg hover:bg-teal-50">Qayta boshlash</button>
                         </div>
                     )}
                 </div>
             );
        };

        const FillBlanks = () => {
             const [answers, setAnswers] = React.useState({});
             const [showResult, setShowResult] = React.useState(false);

             const handleDrop = (qIdx, word) => {
                 setAnswers({...answers, [qIdx]: word});
             };

             const submit = () => {
                 setShowResult(true);
             };

             // Calculate available words
             const usedWords = Object.values(answers);
             const availableWords = allWordsBank.filter(w => !usedWords.includes(w) || fillBlanksData.filter(d=>d.answer===w).length > usedWords.filter(u=>u===w).length);

             return (
                 <div className="max-w-4xl mx-auto">
                     <div className="bg-white p-6 rounded-2xl shadow-md mb-8 sticky top-4 z-10 border-2 border-teal-100">
                         <h3 className="font-bold text-gray-500 uppercase text-sm mb-3">So'zlar (So'zni tanlang)</h3>
                         <div className="flex flex-wrap gap-2">
                             {allWordsBank.map((word, i) => {
                                 const countReq = fillBlanksData.filter(d=>d.answer===word).length;
                                 const countUsed = Object.values(answers).filter(u=>u===word).length;
                                 const isAvailable = countUsed < countReq;
                                 
                                 return (
                                     <button 
                                        key={i} 
                                        disabled={!isAvailable || showResult}
                                        className={`px-4 py-2 rounded-lg font-bold shadow-sm transition-all ${isAvailable && !showResult ? 'bg-teal-100 text-teal-800 hover:bg-teal-200 cursor-grab' : 'bg-gray-100 text-gray-400 cursor-not-allowed'}`}
                                        draggable={isAvailable && !showResult}
                                        onDragStart={(e) => e.dataTransfer.setData('text/plain', word)}
                                     >
                                         {word}
                                     </button>
                                 );
                             })}
                         </div>
                         <p className="text-xs text-gray-400 mt-2">Maslahat: Pastdagi bo'shliqlarni to'ldirish uchun so'zni sudrab tashlang yoki tanlang (Drag & Drop).</p>
                     </div>

                     <div className="bg-white p-8 rounded-3xl shadow-lg space-y-6">
                         {fillBlanksData.map((q, i) => {
                             const parts = q.sentence.split("___");
                             const isCorrect = showResult && answers[i] === q.answer;
                             const isWrong = showResult && answers[i] && answers[i] !== q.answer;

                             return (
                                 <div key={i} className="flex items-center flex-wrap text-xl gap-2 pb-4 border-b border-gray-50 last:border-0"
                                      onDragOver={(e) => e.preventDefault()}
                                      onDrop={(e) => {
                                          e.preventDefault();
                                          if(!showResult) handleDrop(i, e.dataTransfer.getData('text/plain'));
                                      }}
                                 >
                                     <span className="text-teal-500 font-bold w-6">{i+1}.</span>
                                     <span>{parts[0]}</span>
                                     <span 
                                        className={`inline-block min-w-[80px] h-10 border-b-2 text-center font-bold px-2 cursor-pointer transition-colors ${answers[i] ? 'border-teal-500 text-teal-700' : 'border-gray-300 border-dashed bg-gray-50'} ${isCorrect ? '!border-green-500 !text-green-600 bg-green-50' : ''} ${isWrong ? '!border-red-500 !text-red-600 bg-red-50' : ''}`}
                                        onClick={() => {
                                            if(!showResult && answers[i]) {
                                                const newAns = {...answers};
                                                delete newAns[i];
                                                setAnswers(newAns);
                                            }
                                        }}
                                     >
                                         {answers[i] || ""}
                                     </span>
                                     <span>{parts[1]}</span>
                                     {isCorrect && <CheckIcon />}
                                     {isWrong && <span className="text-sm font-bold text-red-500 ml-2">({q.answer})</span>}
                                 </div>
                             );
                         })}
                         
                         {!showResult ? (
                             <div className="pt-6 text-center">
                                <button onClick={submit} className="px-8 py-3 bg-teal-600 text-white font-bold rounded-xl shadow hover:bg-teal-700">Tekshirish</button>
                             </div>
                         ) : (
                             <div className="pt-6 text-center">
                                <button onClick={() => {setShowResult(false); setAnswers({});}} className="px-8 py-3 bg-white border border-teal-600 text-teal-600 font-bold rounded-xl shadow hover:bg-teal-50">Qayta boshlash</button>
                             </div>
                         )}
                     </div>
                 </div>
             );
        };

        const App = () => {
            const [activeTab, setActiveTab] = React.useState('flashcards');

            const tabs = [
                { id: 'flashcards', label: 'Chaqmoq kartalar' },
                { id: 'vocab', label: "Lug'at testi" },
                { id: 'dialogue', label: 'Muloqot' },
                { id: 'grammarExp', label: 'Grammatika' },
                { id: 'grammarQuiz', label: 'Grammatika testi' },
                { id: 'fill', label: "So'zlarni to'ldirish" }
            ];

            return (
                <div className="min-h-screen flex flex-col relative overflow-hidden">
                    {/* Background decorative SVGs */}
                    <svg className="absolute top-0 left-0 w-full h-96 -z-10 opacity-20 pointer-events-none" viewBox="0 0 1440 320" xmlns="http://www.w3.org/2000/svg">
                        <path fill="#0d9488" fillOpacity="1" d="M0,96L48,112C96,128,192,160,288,165.3C384,171,480,149,576,122.7C672,96,768,64,864,64C960,64,1056,96,1152,112C1248,128,1344,128,1392,128L1440,128L1440,0L1392,0C1344,0,1248,0,1152,0C1056,0,960,0,864,0C768,0,672,0,576,0C480,0,384,0,288,0C192,0,96,0,48,0L0,0Z"></path>
                    </svg>

                    <header className="py-12 px-4 text-center">
                        <h1 className="text-4xl md:text-5xl font-extrabold text-teal-800 mb-2 drop-shadow-sm">
                            还是打车去北大吧
                        </h1>
                        <h2 className="text-lg md:text-xl font-medium text-teal-600 bg-white/60 inline-block px-4 py-1 rounded-full shadow-sm backdrop-blur-sm">
                            Dilfuza Kāng lǎo shī bilan xitoy tilini o'rganmiz
                        </h2>
                    </header>

                    <main className="flex-grow container mx-auto px-4 pb-20">
                        {/* Navigation */}
                        <div className="flex flex-wrap justify-center gap-2 mb-10 max-w-4xl mx-auto">
                            {tabs.map(tab => (
                                <button
                                    key={tab.id}
                                    onClick={() => setActiveTab(tab.id)}
                                    className={`px-5 py-2.5 rounded-full font-bold transition-all shadow-sm ${activeTab === tab.id ? 'bg-teal-600 text-white scale-105 shadow-md' : 'bg-white text-gray-600 hover:bg-teal-50 hover:text-teal-700'}`}
                                >
                                    {tab.label}
                                </button>
                            ))}
                        </div>

                        {/* Content Area */}
                    <div className="animate-fade-in">
                        {activeTab === 'flashcards' && <Flashcards />}
                        {activeTab === 'vocab' && <VocabQuiz />}
                        {activeTab === 'dialogue' && <Dialogue />}
                        {activeTab === 'grammarExp' && <GrammarExp />}
                        {activeTab === 'grammarQuiz' && <GrammarQuiz />}
                        {activeTab === 'fill' && <FillBlanks />}
                    </div>
                </main>

                {/* Required Footer */}
                <footer className="glass-panel mt-auto py-6 text-center text-sm font-medium text-gray-500 relative z-10 border-t border-teal-100">
                    <p>HSK 2 NEW3.0 - Lesson 2</p>
                    <p className="mt-1">© 2026 Dilfuza Kāng lǎo shī (telegram@diffila)</p>
                </footer>
            </div>
        );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    
    <style>
        /* Simple fade in animation for tab switching */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }
    </style>
</body>
</html>
